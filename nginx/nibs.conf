server {
  listen 80;
  server_name office.naleli.co.za;

  # If using Nginx Proxy Manager, simply proxy to the Docker container.
  # If running Nginx directly, uncomment the SSL block below (and the
  # cert paths) after running `certbot --nginx -d office.naleli.co.za`.

  client_max_body_size 25M;

  location / {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 90;
  }

  location /uploads/ {
    alias /data/uploads/;
    expires 7d;
  }

  # SSL (when terminating here; if using NPM, terminate there and forward HTTP)
  # listen 443 ssl http2;
  # ssl_certificate     /etc/letsencrypt/live/office.naleli.co.za/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/office.naleli.co.za/privkey.pem;
  # include /etc/letsencrypt/options-ssl-nginx.conf;
  # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
